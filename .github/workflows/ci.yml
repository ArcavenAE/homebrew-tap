name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Formula Audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit formulas
        run: brew audit --formula Formula/*.rb
      - name: Check style
        run: brew style Formula/*.rb
